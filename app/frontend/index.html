<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K8s Demo</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      text-align: center;
      padding: 40px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .status {
      font-weight: bold;
      margin-bottom: 20px;
    }

    .ok {
      color: #22c55e;
    }

    .error {
      color: #ef4444;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #3b82f6;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    button:hover {
      background: #2563eb;
    }

    pre {
      text-align: left;
      background: #1e293b;
      padding: 20px;
      border-radius: 8px;
      overflow-x: auto;
      max-width: 800px;
      margin: 0 auto;
    }
  </style>
</head>

<body>
  <h1>Kubernetes Demo</h1>
  <div id="status" class="status">Loading...</div>

  <button onclick="fetchData()">Refresh</button>

  <pre id="output">Waiting for data...</pre>

  <script src="app.js"></script>
</body>
</html>
