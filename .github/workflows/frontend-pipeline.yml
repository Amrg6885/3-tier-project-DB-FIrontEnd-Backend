name: Build Docker

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: login to dockerhub 
        run : docker login -U ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: build New fronend image version2
        run : docker build -t frontend:v2 -f /frontendV2/Dockerfile .  && docker tag frontend:v2  amrg6885/frontend:v2

      - name: push to docker hub 
        run: docker push amrg6885/frontend:v2

      - name: check images 
        run: docker images
